<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria de Palabras</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-color), #1e1b4b);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.instructions {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #word-display {
            font-size: 4rem;
            font-weight: 600;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: scale(0.9);
        }

        #word-display.visible {
            opacity: 1;
            transform: scale(1);
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            transition: width 0.3s linear;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .word-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            user-select: none;
        }

        .word-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .word-card.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .word-card.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--success-color);
            color: var(--success-color);
        }

        .word-card.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .word-card.missed {
            border-color: var(--success-color);
            border-style: dashed;
            opacity: 0.7;
        }

        #result-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div class="container" id="main-container">
        <!-- Start Screen -->
        <div id="start-screen">
            <h1>Memoria de Palabras</h1>
            <p style="font-size: 0.9rem; margin-top: -15px; margin-bottom: 20px; color: #94a3b8;">by Mariano Damian ver 1.0</p>
            <p class="instructions">Se te mostrarán 10 palabras, una por una, cada 2 segundos. Memorízalas. Luego,
                tendrás que encontrarlas entre 30 opciones.</p>
            <button class="btn" id="start-btn">Comenzar Juego</button>
        </div>

        <!-- Memorize Screen -->
        <div id="memorize-screen" class="hidden">
            <h1>Memoriza...</h1>
            <p class="instructions">Palabra <span id="word-counter">1</span> de 10</p>
            <div id="word-display">Palabra</div>
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- Selection Screen -->
        <div id="selection-screen" class="hidden">
            <h1>Encuentra las palabras</h1>
            <p class="instructions">Selecciona las 10 palabras que viste anteriormente (<span
                    id="selection-counter">0</span>/10)</p>
            <div class="word-grid" id="word-grid">
                <!-- Words will be injected here -->
            </div>
            <button class="btn" id="check-btn" disabled>Comprobar Resultados</button>
            <div id="result-text" class="hidden" style="margin-top: 20px;"></div>
            <button class="btn hidden" id="restart-btn" style="margin-top: 10px;">Jugar de Nuevo</button>
        </div>
    </div>

    <script>
        const wordPool = [
            "Gato", "Perro", "Casa", "Árbol", "Cielo", "Agua", "Fuego", "Tierra", "Sol", "Luna",
            "Estrella", "Montaña", "Río", "Mar", "Bosque", "Flor", "Pájaro", "Nube", "Viento", "Nieve",
            "Lluvia", "Camino", "Piedra", "Arena", "Ciudad", "Pueblo", "Calle", "Coche", "Tren", "Avión",
            "Barco", "Libro", "Mesa", "Silla", "Cama", "Puerta", "Ventana", "Reloj", "Espejo", "Cuadro",
            "Lápiz", "Papel", "Música", "Canción", "Baile", "Juego", "Sonrisa", "Mirada", "Voz", "Palabra",
            "Mente", "Tiempo", "Luz", "Sombra", "Color", "Forma", "Fuerza", "Paz", "Amor", "Vida"
        ];

        let wordsToRemember = [];
        let allDisplayedWords = [];
        let selectedWords = new Set();
        let currentIndex = 0;

        const screens = {
            start: document.getElementById('start-screen'),
            memorize: document.getElementById('memorize-screen'),
            selection: document.getElementById('selection-screen')
        };

        const elements = {
            startBtn: document.getElementById('start-btn'),
            wordDisplay: document.getElementById('word-display'),
            wordCounter: document.getElementById('word-counter'),
            progressBar: document.getElementById('progress-bar'),
            progressContainer: document.getElementById('progress-container'),
            wordGrid: document.getElementById('word-grid'),
            selectionCounter: document.getElementById('selection-counter'),
            checkBtn: document.getElementById('check-btn'),
            resultText: document.getElementById('result-text'),
            restartBtn: document.getElementById('restart-btn')
        };

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showScreen(screenName) {
            Object.values(screens).forEach(s => {
                if (s) s.classList.add('hidden');
            });
            if (screens[screenName]) {
                screens[screenName].classList.remove('hidden');
            }
        }

        function startGame() {
            const shuffledPool = shuffleArray([...wordPool]);
            wordsToRemember = shuffledPool.slice(0, 10);

            const remainingPool = shuffledPool.slice(10);
            const distractorWords = remainingPool.slice(0, 20);
            allDisplayedWords = shuffleArray([...wordsToRemember, ...distractorWords]);

            currentIndex = 0;
            selectedWords.clear();

            showScreen('memorize');
            elements.progressContainer.style.display = 'block';
            showNextWord();
        }

        function showNextWord() {
            if (currentIndex >= wordsToRemember.length) {
                startSelectionPhase();
                return;
            }

            elements.wordCounter.textContent = currentIndex + 1;
            elements.wordDisplay.textContent = wordsToRemember[currentIndex];

            elements.wordDisplay.classList.remove('visible');
            elements.progressBar.style.transition = 'none';
            elements.progressBar.style.width = '0%';

            // Allow DOM to update before starting transition
            setTimeout(() => {
                elements.wordDisplay.classList.add('visible');
                elements.progressBar.style.transition = 'width 2s linear';
                elements.progressBar.style.width = '100%';
            }, 50);

            currentIndex++;

            setTimeout(() => {
                elements.wordDisplay.classList.remove('visible');
                setTimeout(showNextWord, 200); // 0.2s pause before next word
            }, 2000); // 2 seconds duration
        }

        function startSelectionPhase() {
            showScreen('selection');
            elements.wordGrid.innerHTML = '';
            elements.selectionCounter.textContent = '0';
            elements.checkBtn.disabled = true;
            elements.checkBtn.classList.remove('hidden');
            elements.resultText.classList.add('hidden');
            elements.restartBtn.classList.add('hidden');

            allDisplayedWords.forEach(word => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.textContent = word;
                card.dataset.word = word;

                card.addEventListener('click', () => toggleWordSelection(card, word));
                elements.wordGrid.appendChild(card);
            });
        }

        function toggleWordSelection(card, word) {
            if (elements.resultText.classList.contains('hidden') === false) return;

            if (selectedWords.has(word)) {
                selectedWords.delete(word);
                card.classList.remove('selected');
            } else {
                if (selectedWords.size < 10) {
                    selectedWords.add(word);
                    card.classList.add('selected');
                }
            }

            elements.selectionCounter.textContent = selectedWords.size;
            elements.checkBtn.disabled = selectedWords.size !== 10;
        }

        function checkResults() {
            let correctCount = 0;

            const cards = document.querySelectorAll('.word-card');
            cards.forEach(card => {
                const word = card.dataset.word;
                const isSelected = selectedWords.has(word);
                const isCorrectWord = wordsToRemember.includes(word);

                card.classList.remove('selected');

                if (isSelected && isCorrectWord) {
                    card.classList.add('correct');
                    correctCount++;
                } else if (isSelected && !isCorrectWord) {
                    card.classList.add('incorrect');
                } else if (!isSelected && isCorrectWord) {
                    card.classList.add('missed');
                }
            });

            elements.resultText.textContent = `Has acertado ${correctCount} de 10 palabras.`;
            elements.resultText.style.color = correctCount > 7 ? 'var(--success-color)' : (correctCount > 4 ? '#fbbf24' : 'var(--error-color)');
            elements.resultText.classList.remove('hidden');

            elements.checkBtn.classList.add('hidden');
            elements.restartBtn.classList.remove('hidden');
        }

        elements.startBtn.addEventListener('click', startGame);
        elements.checkBtn.addEventListener('click', checkResults);
        elements.restartBtn.addEventListener('click', () => showScreen('start'));

    </script>
</body>

</html>
